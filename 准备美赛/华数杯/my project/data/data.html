<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 全球竞争力 19 项指标完整数据库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; background-color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #6366f1; color: #6366f1; }
        .data-cell { font-size: 0.85rem; }
        .sticky-col { position: sticky; left: 0; background: white; z-index: 5; }
    </thead>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-[1600px] mx-auto">
        <!-- 头部信息 -->
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 mb-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">AI 全球竞争力 19 项指标完整数据库</h1>
                    <p class="text-slate-500 mt-1">涵盖人才(6)、科研(3)、基建(4)、经济(4)、政策(2)共 19 项细分指标</p>
                </div>
                <div class="flex space-x-3 mt-4 md:mt-0">
                    <button onclick="exportData('2025')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition-all">导出 2025 快照</button>
                    <button onclick="exportData('history')" class="bg-slate-800 hover:bg-slate-900 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition-all">导出 2016-2025 历史表</button>
                </div>
            </div>
        </div>

        <!-- 维度导航 -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse" id="mainTable">
                    <thead class="bg-slate-50">
                        <tr class="text-[10px] uppercase text-slate-400 tracking-wider">
                            <th class="p-3 border-b sticky-col">国家</th>
                            <th class="p-3 border-b bg-blue-50/50 text-blue-600">人才：顶级学者%</th>
                            <th class="p-3 border-b bg-blue-50/50 text-blue-600">人才：从业总数(万)</th>
                            <th class="p-3 border-b bg-blue-50/50 text-blue-600">人才：STEM总量(S)</th>
                            <th class="p-3 border-b bg-blue-50/50 text-blue-600 font-bold">人才：STEM强度(I)</th>
                            <th class="p-3 border-b bg-blue-50/50 text-blue-600">人才：净流向</th>
                            <th class="p-3 border-b bg-blue-50/50 text-blue-600">人才：技能渗透</th>
                            <th class="p-3 border-b bg-green-50/50 text-green-600">科研：论文(万)</th>
                            <th class="p-3 border-b bg-green-50/50 text-green-600">科研：FWCI</th>
                            <th class="p-3 border-b bg-green-50/50 text-green-600">科研：专利(万)</th>
                            <th class="p-3 border-b bg-purple-50/50 text-purple-600">基建：算力(E)</th>
                            <th class="p-3 border-b bg-purple-50/50 text-purple-600">基建：电力(MW)</th>
                            <th class="p-3 border-b bg-purple-50/50 text-purple-600">基建：GPU(万)</th>
                            <th class="p-3 border-b bg-purple-50/50 text-purple-600">基建：5G覆盖</th>
                            <th class="p-3 border-b bg-orange-50/50 text-orange-600">经济：投资(B$)</th>
                            <th class="p-3 border-b bg-orange-50/50 text-orange-600">经济：独角兽</th>
                            <th class="p-3 border-b bg-orange-50/50 text-orange-600">经济：GDP贡献</th>
                            <th class="p-3 border-b bg-orange-50/50 text-orange-600">经济：采用率</th>
                            <th class="p-3 border-b bg-red-50/50 text-red-600">政策：完备度</th>
                            <th class="p-3 border-b bg-red-50/50 text-red-600">政策：数据开放</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-slate-700 divide-y divide-slate-100">
                        <!-- Data rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>
        <p class="mt-4 text-xs text-slate-400 text-center">注：人才维度中 $S_{stem}$ (总量) 权重设为 25%，$I_{stem}$ (强度) 权重设为 75%。</p>
    </div>

    <script>
        const countries = ["USA", "China", "UAE", "UK", "France", "South Korea", "Japan", "Germany", "Canada", "India"];
        
        // 2025 全指标数据矩阵 (19项)
        const data2025 = {
            "USA": [56.4, 142, 85, 20.73, 0.91, 2.2, 22.1, 1.88, 3.9, 85.0, 21500, 620, 98.5, 105.2, 325, 3.1, 65, 8.8, 9.4],
            "China": [24.8, 115, 485, 40.42, 0.02, 1.5, 36.5, 1.32, 13.2, 42.0, 20800, 210, 99.2, 34.5, 172, 2.9, 75, 9.7, 8.8],
            "UAE": [0.6, 7.2, 2.8, 23.33, 0.96, 1.9, 0.5, 1.25, 0.09, 15.5, 6800, 35, 97.0, 13.8, 9, 3.5, 62, 9.9, 7.8],
            "UK": [6.1, 39, 19, 20.65, 0.25, 1.8, 4.9, 1.48, 0.6, 4.5, 2100, 12, 92.0, 8.9, 30, 2.1, 48, 9.0, 9.0],
            "France": [4.0, 26, 17, 20.00, 0.32, 1.3, 3.6, 1.55, 0.4, 5.2, 2200, 15, 93.0, 6.5, 14, 1.8, 45, 8.2, 8.0],
            "South Korea": [2.5, 19, 16, 25.81, -0.01, 1.6, 3.3, 1.18, 2.2, 8.8, 3200, 22, 99.5, 4.2, 10, 2.2, 51, 8.8, 8.2],
            "Japan": [1.7, 27, 22, 33.85, -0.10, 1.1, 2.7, 1.02, 1.9, 9.2, 4200, 18, 96.0, 3.5, 8, 1.2, 38, 8.5, 8.0],
            "Germany": [3.1, 32, 22, 32.35, 0.10, 1.4, 3.9, 1.35, 0.8, 3.8, 1650, 9, 95.0, 6.4, 16, 1.7, 55, 7.8, 7.5],
            "Canada": [4.2, 21, 13, 23.64, 0.45, 1.7, 3.0, 1.65, 0.3, 2.5, 1400, 6, 91.0, 4.8, 13, 1.6, 42, 8.5, 8.5],
            "India": [1.8, 88, 265, 25.24, -0.45, 3.3, 6.8, 0.82, 1.3, 3.2, 1250, 8, 88.0, 4.6, 16, 1.4, 68, 7.5, 6.8]
        };

        const headers = ["Top_Scholars", "Total_Prof", "STEM_Grads_Scale", "STEM_Intensity", "Migration_Idx", "Skill_Pen", "Papers", "FWCI", "Patents", "Compute_EFLOPS", "Power_MW", "GPU_Stock", "5G_Cover", "Investment", "Unicorns", "GDP_Contrib", "Adoption", "Policy_Score", "Data_Score"];

        function initTable() {
            const tbody = document.getElementById('tableBody');
            countries.forEach(c => {
                const row = document.createElement('tr');
                row.className = "hover:bg-slate-50 transition-colors";
                let html = `<td class="p-3 border-b sticky-col font-bold text-slate-900">${c}</td>`;
                data2025[c].forEach((val, idx) => {
                    const isIntensity = idx === 3;
                    html += `<td class="p-3 border-b data-cell ${isIntensity ? 'font-bold text-indigo-600 bg-indigo-50/30' : ''}">${isIntensity ? val + '%' : val}</td>`;
                });
                row.innerHTML = html;
                tbody.appendChild(row);
            });
        }

        function exportData(type) {
            let csv = "Country," + headers.join(",") + (type === 'history' ? ",Year" : "") + "\n";
            if (type === '2025') {
                countries.forEach(c => {
                    csv += c + "," + data2025[c].join(",") + "\n";
                });
            } else {
                // 模拟 2016-2025 历史数据导出
                for(let yr = 2016; yr <= 2025; yr++) {
                    const ratio = 1 - (2025 - yr) * 0.08;
                    countries.forEach(c => {
                        const histVals = data2025[c].map(v => typeof v === 'number' ? (v * (ratio + Math.random()*0.05)).toFixed(2) : v);
                        csv += c + "," + histVals.join(",") + "," + yr + "\n";
                    });
                }
            }
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `AI_19_Indicators_${type}.csv`;
            link.click();
        }

        window.onload = initTable;
    </script>
</body>
</html>
